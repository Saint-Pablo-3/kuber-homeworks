---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: local-pv
spec:
  capacity:
    storage: 1Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /mnt/data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: local-pvc
spec:
  volumeName: local-pv
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-exchange-pvc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-exchange-pvc
  template:
    metadata:
      labels:
        app: data-exchange-pvc
    spec:
      containers:
        - name: writer
          image: busybox
          command: ["/bin/sh", "-c"]
          args:
            - while true; do
              date >> /data/data.txt;
              sleep 5;
              done
          volumeMounts:
            - name: pvc-volume
              mountPath: /data

        - name: reader
          image: busybox
          command: ["/bin/sh", "-c"]
          args:
            - tail -f /data/data.txt
          volumeMounts:
            - name: pvc-volume
              mountPath: /data

      volumes:
        - name: pvc-volume
          persistentVolumeClaim:
            claimName: local-pvc
